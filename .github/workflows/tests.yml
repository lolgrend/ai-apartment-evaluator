name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        env:
          LITE_LLM_KEY: test-key
          LITE_LLM_BASE_URL: http://litellm.test:4000
          LANGFUSE_PUBLIC_KEY: ""
          LANGFUSE_SECRET_KEY: ""
          LANGFUSE_BASE_URL: ""
          LANGFUSE_HOST: ""
        run: python -m unittest discover -s tests -v
