<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#f7f6f2">
  <link rel="manifest" href="/static/manifest.webmanifest">
  <link rel="icon" href="/static/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/static/icon.svg">
  <link rel="stylesheet" href="/static/style.css?v=6">
  <title>{% block title %}Metr.{% endblock %}</title>
</head>
<body>
  {% if show_nav|default(true) and request.session.get('user_id') %}
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="brand" aria-label="Metr. home">Metr.</a>
      <div class="header-actions">
        <a href="/settings" class="account-link" aria-label="Account settings">
          <span class="avatar">{{ user.username[0]|upper }}</span>
          <span>{{ user.username }}</span>
        </a>
        <a href="/add" class="btn btn-primary btn-header">
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
          Check listing
        </a>
      </div>
    </div>
  </header>
  {% endif %}

  <main class="container {% if not request.session.get('user_id') %}container-auth{% endif %}">
    {% block content %}{% endblock %}
  </main>

  {% if show_nav|default(true) and request.session.get('user_id') %}
  <nav class="tabbar" aria-label="Main navigation">
    <a href="/" class="tab {{ 'active' if request.url.path == '/' else '' }}">
      <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m3 11 9-7 9 7v9H8v-6h8v6"/></svg><span>Apartments</span>
    </a>
    <a href="/add" class="tab tab-add {{ 'active' if request.url.path == '/add' else '' }}">
      <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg><span>Check</span>
    </a>
    <a href="/settings" class="tab {{ 'active' if request.url.path == '/settings' else '' }}">
      <svg aria-hidden="true" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1-2.8 2.8-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6v.2h-4V21a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1L4.2 17l.1-.1a1.7 1.7 0 0 0 .3-1.9A1.7 1.7 0 0 0 3 14H2.8v-4H3a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9L4.2 7 7 4.2l.1.1A1.7 1.7 0 0 0 9 4.6 1.7 1.7 0 0 0 10 3V2.8h4V3a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1L19.8 7l-.1.1a1.7 1.7 0 0 0-.3 1.9 1.7 1.7 0 0 0 1.6 1h.2v4H21a1.7 1.7 0 0 0-1.6 1Z"/></svg>
      <span>Settings</span>
    </a>
  </nav>
  {% endif %}
  <script src="/static/app.js?v=5" defer></script>
</body>
</html>
